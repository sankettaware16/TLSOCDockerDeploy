
# =============================================================================
# TLSOC Docker Compose — Full Stack including FOSS SOC Engine
# =============================================================================
# This file defines ALL services that make up the TLSOC stack.
# Run with: docker compose up -d
#
# How containers talk to each other:
#   Docker Compose automatically creates a private network.
#   Every service below can reach every other service using its SERVICE NAME
#   as the hostname. For example, the engine reaches Kafka at "kafka:9092"
#   and Redis at "redis:6379". No IPs needed.
#
# HOW THE LOG FLOW WORKS:
#   [Source servers] → rsyslog+omkafka → kafka:9094 (external port)
#   kafka → foss-soc-engine (reads topic, parses logs, writes JSON files)
#   foss-soc-engine → /var/log/soc_output/*.json  (inside named volume)
#   logstash → reads /parser_output/*.json         (same named volume, read-only)
#   logstash → elasticsearch → kibana
# =============================================================================

services:

  # ─────────────────────────────────────────────────────────────────────────
  # ELASTICSEARCH — The database that stores all parsed log events
  # ─────────────────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION}
    # container_name gives this container a fixed name so you can run
    # 'docker logs elasticsearch' instead of 'docker logs <random-hash>'
    container_name: elasticsearch
    environment:
      # single-node: tells Elasticsearch not to wait for other ES nodes to form
      # a cluster. Required for a standalone single-machine setup.
      - discovery.type=single-node
      # bootstrap.memory_lock=true: locks the JVM heap in RAM, preventing
      # Elasticsearch from swapping to disk (swapping kills ES performance).
      - bootstrap.memory_lock=true
      # ES_JAVA_OPTS: sets the JVM heap size. ELASTIC_HEAP comes from .env
      # -Xms = minimum heap, -Xmx = maximum heap. Keep them equal.
      - ES_JAVA_OPTS=-Xms${ELASTIC_HEAP} -Xmx${ELASTIC_HEAP}
      # The password for the built-in 'elastic' superuser. Comes from .env
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      # Enable Elasticsearch's built-in security (authentication + TLS)
      - xpack.security.enabled=true
      # Enable TLS on the HTTP API (port 9200). Without this, ES accepts plain HTTP.
      - xpack.security.http.ssl.enabled=true
      # Paths to the TLS key, certificate, and CA inside the container.
      # These files are mounted from ./certs/ by the volumes section below.
      - xpack.security.http.ssl.key=/usr/share/elasticsearch/config/certs/elasticsearch.key
      - xpack.security.http.ssl.certificate=/usr/share/elasticsearch/config/certs/elasticsearch.crt
      - xpack.security.http.ssl.certificate_authorities=/usr/share/elasticsearch/config/certs/ca.crt
    volumes:
      # Mount the TLS certs generated by generate-certs.sh into the container
      - ./certs/elasticsearch:/usr/share/elasticsearch/config/certs
      - ./certs/ca/ca.crt:/usr/share/elasticsearch/config/certs/ca.crt
      # esdata is a named volume (defined at the bottom of this file).
      # It persists Elasticsearch's index data across container restarts.
      # Without this, all logs are lost every time you restart ES.
      - esdata:/usr/share/elasticsearch/data
    ports:
      # Expose port 9200 on the HOST machine so you can query ES directly
      # Format is HOST_PORT:CONTAINER_PORT
      - "9200:9200"
    ulimits:
      # memlock: required for bootstrap.memory_lock=true to actually work.
      # Without this, the kernel ignores the memory lock request and ES
      # will swap to disk under load, causing major performance degradation.
      # -1 means unlimited (no cap on locked memory).
      memlock: -1


  # ─────────────────────────────────────────────────────────────────────────
  # KIBANA — The web dashboard analysts use to view and search logs
  # ─────────────────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_VERSION}
    container_name: kibana
    depends_on:
      # depends_on tells Docker to start elasticsearch BEFORE kibana.
      # Without this, Kibana might start before ES is ready and fail to connect.
      - elasticsearch
    environment:
      # Tell Kibana where Elasticsearch is. 'elasticsearch' is the service name.
      - ELASTICSEARCH_HOSTS=https://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      # Password for the kibana_system user (set after first-run — see README)
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      # Enable TLS on Kibana's own web interface so users access it via HTTPS
      - SERVER_SSL_ENABLED=true
      - SERVER_SSL_CERTIFICATE=/usr/share/kibana/config/certs/kibana.crt
      - SERVER_SSL_KEY=/usr/share/kibana/config/certs/kibana.key
      # Kibana needs the CA cert to trust Elasticsearch's TLS certificate
      - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=/usr/share/kibana/config/certs/ca.crt
      # Encryption key for saved objects (dashboards, alerts). Must be 32+ chars.
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=9f3a8c1e5d7b4a2f6c9d8e7a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8
    volumes:
      - ./certs/kibana:/usr/share/kibana/config/certs
      - ./certs/ca/ca.crt:/usr/share/kibana/config/certs/ca.crt
    ports:
      # ${KIBANA_PORT} comes from .env (default 5601)
      # Access Kibana at: https://<your-server-ip>:5601
      - "${KIBANA_PORT}:5601"


  # ─────────────────────────────────────────────────────────────────────────
  # KAFKA — The message broker that buffers all incoming logs
  # ─────────────────────────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:4.0.0
    container_name: kafka
    environment:
      # KRaft mode: Kafka 4.0 runs without Zookeeper (self-managed metadata)
      # KAFKA_NODE_ID: unique ID for this broker in the cluster (1 = first/only)
      - KAFKA_NODE_ID=1
      # This node acts as both a broker (handles log messages) and
      # controller (handles cluster coordination). Fine for single-node.
      - KAFKA_PROCESS_ROLES=broker,controller

      # KAFKA_LISTENERS: defines what addresses Kafka binds to internally.
      # INTERNAL → for other containers on the same Docker network (port 9092)
      # EXTERNAL → for rsyslog clients on the outside network (port 9094)
      # CONTROLLER → for KRaft cluster coordination (port 9093)
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093

      # KAFKA_ADVERTISED_LISTENERS: the addresses Kafka tells clients to connect to.
      # INTERNAL: other containers (like the engine) use 'kafka:9092'
      # EXTERNAL: outside rsyslog clients use the actual server IP on port 9094
      # HOST_IP comes from .env — it's the machine's real IP address
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://${HOST_IP}:9094

      # Protocol map: what security protocol each listener uses.
      # PLAINTEXT = no encryption (fine for internal/demo; add SSL for production)
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT

      # Which listener other Kafka brokers use to talk to each other
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      # Which listener handles KRaft controller communication
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      # In single-node KRaft mode: node 1 is the only controller, at kafka:9093
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093

      # Replication factor 1 = only one copy of data (single broker).
      # For production with 3 brokers, change to 3.
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    ports:
      # Only expose the EXTERNAL port (9094) to outside — this is what rsyslog connects to.
      # Port 9092 (INTERNAL) is NOT exposed outside Docker — containers use it internally.
      - "9094:9094"


  # ─────────────────────────────────────────────────────────────────────────
  # REDIS — State store for the FOSS SOC Engine's stateful parser
  # ─────────────────────────────────────────────────────────────────────────
  # WHY REDIS IS NEEDED:
  # The engine's 'stateful' parsing strategy (used for Postfix email logs)
  # correlates multiple log lines into one event using a transaction ID.
  # For example, Postfix writes 5 separate log lines per email, each with
  # the same queue ID (like "ABC123"). The engine buffers partial events
  # in Redis keyed by queue ID, then emits the complete event when it sees
  # the "removed" signal. Without Redis, multi-line events are lost.
  redis:
    image: redis:7-alpine
    # redis:7-alpine is the official Redis image based on Alpine Linux.
    # Alpine is a minimal Linux (~5MB) — keeps the container tiny.
    # Redis itself uses almost no RAM when idle (~5MB).
    container_name: redis
    # restart: always means Docker automatically restarts this container
    # if it crashes or if the host machine reboots.
    restart: always
    # No ports exposed: Redis should NOT be accessible from outside Docker.
    # Only the foss-soc-engine container connects to it, internally.
    # Exposing Redis to the internet is a major security risk.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s


  # ─────────────────────────────────────────────────────────────────────────
  # FOSS SOC ENGINE — The Python parsing and normalisation engine
  # ─────────────────────────────────────────────────────────────────────────
  foss-soc-engine:
    # 'build' means Docker will BUILD the image from a Dockerfile instead of
    # pulling a pre-built image from Docker Hub.
    build:
      # context: the directory Docker uses as the build root.
      # All COPY commands in the Dockerfile are relative to this path.
      # ../../foss-soc-engine-rule-apache/foss-soc-engine-rule-apache
      # means: go up two levels from where docker-compose.yml lives,
      # then into the engine repo directory.
      # Adjust this path if you move the engine folder.
      # The engine source code lives in the 'engine/' subfolder of this directory.
      # On the server: /opt/TLSOCDockerDeploy/engine/
      context: ./engine
      # args are passed to the Dockerfile as ARG values at build time.
      # The Dockerfile uses MAXMIND_LICENSE_KEY to download the GeoIP database.
      # This comes from .env. If you don't have a key, leave it blank in .env.
      args:
        MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY:-}
    container_name: foss-soc-engine
    restart: always
    depends_on:
      # The engine needs Kafka to exist before it starts (to subscribe to topics)
      # The engine needs Redis for stateful parsing (Postfix logs etc.)
      # WITHOUT these, the engine will crash on startup.
      - kafka
      - redis
    environment:
      # REDIS_HOST: tells the engine which hostname to connect to for Redis.
      # 'redis' matches the service name above. Docker resolves this to
      # Redis's internal IP automatically. This overrides the engine's default
      # 'localhost' which would be wrong inside a container.
      - REDIS_HOST=redis
      # Standard Redis port. Included for completeness / future flexibility.
      - REDIS_PORT=6379
    healthcheck:
      # stats.json is written every 60s — healthy once it exists and is recent (< 120s old)
      test: >
        sh -c 'test -f /app/logs/stats.json &&
        test $$(( $$(date +%s) - $$(date +%s -r /app/logs/stats.json) )) -lt 120'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    volumes:
      # ── VOLUME 1: Shared output directory ──────────────────────────────
      # The engine writes parsed JSON files to /var/log/soc_output/ inside the container.
      # This is a named Docker volume called 'parser_output'.
      # Logstash (below) mounts the SAME named volume at /parser_output (read-only).
      # This is how the engine's output reaches Logstash without any network calls.
      # Named volumes persist across container restarts (files are NOT lost on restart).
      - parser_output:/var/log/soc_output

      # ── VOLUME 2: Engine logs ──────────────────────────────────────────
      # We changed this to a Named Volume because the Dockerfile now runs the
      # engine as 'appuser' (UID 1001) for security. Binding a host directory 
      # from Windows/Mac causes PermissionDenied errors because the host directory
      # overrides the container's permissions. Named volumes handle this cleanly.
      - foss-engine-logs:/app/logs

      # ── VOLUME 3: GeoIP database (alternative to baking into image) ────
      # If you did NOT provide a MaxMind key at build time, you can manually
      # place GeoLite2-City.mmdb on your host at /etc/tlsoc/geoip/
      # and it will be available to the engine inside the container.
      # To use this: create the directory and place the .mmdb file there.
      # If the file is already baked into the image, this mount is ignored.
      # - /etc/tlsoc/geoip:/app/database


  # ─────────────────────────────────────────────────────────────────────────
  # LOGSTASH — Picks up parsed JSON files and sends them to Elasticsearch
  # ─────────────────────────────────────────────────────────────────────────
  logstash:
    image: docker.elastic.co/logstash/logstash:${ELASTIC_VERSION}
    container_name: logstash
    depends_on:
      - kafka
      - elasticsearch
    volumes:
      # The Logstash pipeline config (kafka-to-es.conf) tells Logstash:
      #   - WHERE to read files from (/parser_output/)
      #   - WHAT to do with them (add hostname field, remove event.original)
      #   - WHERE to send them (Elasticsearch at https://elasticsearch:9200)
      - ./logstash/pipeline:/usr/share/logstash/pipeline

      # TLS certs so Logstash can connect to Elasticsearch over HTTPS
      - ./certs/logstash:/usr/share/logstash/config/certs
      - ./certs/ca/ca.crt:/usr/share/logstash/config/certs/ca.crt

      # ── THE KEY CHANGE FROM THE ORIGINAL docker-compose.yml ─────────────
      # ORIGINAL line was:
      #   - /etc/parser_service/output:/parser_output:ro
      # This used a HOST PATH — meaning Logstash read files from the host machine.
      # That worked when the engine ran as a systemd service on the host.
      #
      # CHANGED TO a NAMED VOLUME:
      #   - parser_output:/parser_output:ro
      # Now both the engine container and logstash container share the same
      # Docker-managed volume. The engine writes files into it, Logstash reads them.
      # :ro means Logstash mounts it READ-ONLY (it cannot accidentally delete files).
      - parser_output:/parser_output:ro

      # Logstash settings file (xpack monitoring disabled, pipeline workers, etc.)
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml
      # Tells Logstash which pipeline config files to load
      - ./logstash/config/pipelines.yml:/usr/share/logstash/config/pipelines.yml
    environment:
      # Logstash uses this to authenticate with Elasticsearch when pushing logs
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}




# =============================================================================
# NAMED VOLUMES
# =============================================================================
# Docker manages these volumes (stored at /var/lib/docker/volumes/ on Linux).
# They persist independently of any container — data survives restarts/rebuilds.
# =============================================================================
volumes:

  # esdata: Elasticsearch's index data (all stored log events)
  # Without this, every time you restart ES, all your logs disappear.
  esdata:

  # parser_output: SHARED between foss-soc-engine (writes) and logstash (reads)
  # This is the bridge that replaces the old host-path mount.
  # When the engine writes /var/log/soc_output/apache_access.json inside its container,
  # Logstash sees it at /parser_output/apache_access.json inside its container.
  parser_output:
  
  # foss-engine-logs: stores engine.log, stats.json, and dlq.json
  # Prevents permission denied errors when the engine runs as non-root
  foss-engine-logs:
