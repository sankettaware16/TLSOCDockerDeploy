name: Feature request
description: Propose an improvement to the stack, installer, or onboarding
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What can't you do today, or what is harder than it should be?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should happen? Note any impact on existing deployments (compose changes, cert regeneration, .env keys).
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
