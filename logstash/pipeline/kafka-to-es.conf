input {
  file {
    # ─────────────────────────────────────────────────────────────────────────
    # INPUT: Read all JSON files written by the FOSS SOC Engine
    # ─────────────────────────────────────────────────────────────────────────
    # The engine writes files named after the 'source_program' field from
    # rsyslog. For example if rsyslog sets source_program = "linux_server_auth",
    # the engine writes /parser_output/linux_server_auth.json
    #
    # path: Logstash reads parsed JSON lines files written by the FOSS SOC Engine.
    # Reverted to hardcoded files to simulate the log source config limitation.
    path => [
      "/parser_output/apache_access_logs.json", 
      "/parser_output/mail_apache_access_logs.json",
      "/parser_output/mail_auth_logs.json",
      "/parser_output/mail_login_logs.json",
      "/parser_output/mail_smtp_logs.json",
      "/parser_output/postfix_logs.json",
      "/parser_output/waf-nginx-access_logs.json",
      "/parser_output/web_auth_logs.json"
    ]

    # start_position: "end" means Logstash only reads NEW lines added after
    # it starts. "beginning" would re-process everything on restart (not what we want).
    start_position => "end"

    # sincedb: Logstash tracks how far it has read in each file using sincedb.
    # This file stores the byte offsets. On restart, Logstash picks up where
    # it left off — no duplicate events sent to Elasticsearch.
    sincedb_path => "/usr/share/logstash/data/sincedb"

    # codec json: each line in the file is a complete JSON object.
    # The engine writes one JSON event per line (NDJSON format).
    codec => json

    # tail mode: read new lines as they are appended (like tail -f).
    mode => "tail"
  }
}


filter {
  # ─────────────────────────────────────────────────────────────────────────
  # FILTER: Normalise the host/server name field for Kibana dashboards
  # ─────────────────────────────────────────────────────────────────────────
  # The engine puts server identity in two possible places depending on the
  # rsyslog template used. We normalise into host.name for ECS compatibility.

  # Prefer meta.server (the 'server' field from the rsyslog KafkaProxyEnvelope)
  if [meta.server] {
    mutate {
      replace => {
        "[host][name]" => "%{[meta.server]}"
      }
    }
  }
  # Fallback: use source_host (the hostname from rsyslog's %HOSTNAME% property)
  else if [meta.source_host] {
    mutate {
      replace => {
        "[host][name]" => "%{[meta.source_host]}"
      }
    }
  }

  # Remove the raw ECS event.original field to save storage space.
  mutate {
    remove_field => [ "[event][original]" ]
  }
}


output {
  # ─────────────────────────────────────────────────────────────────────────
  # OUTPUT: Send parsed events to Elasticsearch
  # ─────────────────────────────────────────────────────────────────────────
  elasticsearch {
    # 'elasticsearch' is the Docker service name — resolves to ES's container IP
    hosts => ["https://elasticsearch:9200"]
    # The CA cert that signed the Elasticsearch TLS certificate.
    # Without this, Logstash rejects the self-signed cert.
    cacert => "/usr/share/logstash/config/certs/ca.crt"
    user => "elastic"
    # ${ELASTIC_PASSWORD} is injected from docker-compose environment section
    password => "${ELASTIC_PASSWORD}"
    # Index name pattern: creates a new index each day e.g. all-logs-2026.05.21
    # The Kibana saved objects use the data view "fosstlsoc-logs-*" to match these.
    index => "fosstlsoc-logs-%{+YYYY.MM.dd}"
  }

  # stdout: prints every event to Logstash's console output.
  # Useful for debugging — you can see events with: docker logs logstash -f
  # Comment this out in production to reduce noise.
  # stdout { codec => rubydebug }
}
