input {
  file {
    # Read parsed JSON logs from the engine. Reverted to simulate log source limits.
    path => [
      "/parser_output/waf_auth_logs.json",
      "/parser_output/mail_auth_logs.json",
      "/parser_output/web_auth_logs.json",
      "/parser_output/summersoc_auth_logs.json",
      "/parser_output/waf-nginx-access_logs.json",
      "/parser_output/mail_apache_access_logs.json",
      "/parser_output/web_apache_access_logs.json",
      "/parser_output/modsec_audit_logs.json",
      "/parser_output/postfix_logs.json",
      "/parser_output/roundcube_login_logs.json"
    ]

    # Only read new logs appended after Logstash starts
    start_position => "end"

    # Track read offsets to resume after restarts
    sincedb_path => "/usr/share/logstash/data/sincedb"

    # Input is single JSON object per line (NDJSON)
    codec => json

    # Tail mode to read new appends
    mode => "tail"
  }
}


filter {
  # Normalize hostname to host.name for ECS compatibility
  # Prefer meta.server if available
  if [meta.server] {
    mutate {
      replace => {
        "[host][name]" => "%{[meta.server]}"
      }
    }
  }
  # Fallback to source_host if meta.server is missing
  else if [meta.source_host] {
    mutate {
      replace => {
        "[host][name]" => "%{[meta.source_host]}"
      }
    }
  }

  # Remove raw syslog event to save storage space
  mutate {
    remove_field => [ "[event][original]" ]
  }
}


output {
  # Send logs to Elasticsearch
  elasticsearch {
    # ES host address
    hosts => ["https://elasticsearch:9200"]
    # CA certificate to verify ES TLS certificate
    cacert => "/usr/share/logstash/config/certs/ca.crt"
    user => "elastic"
    # Password and index pattern (creates daily indices matched by fosstlsoc-logs-*)
    password => "${ELASTIC_PASSWORD}"
    index => "fosstlsoc-logs-%{+YYYY.MM.dd}"
  }

  # Console output for debugging (comment out in production)
  # stdout { codec => rubydebug }
}
